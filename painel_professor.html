<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Professor | BJJ Exams</title>
    <link rel="icon" type="image/png" href="logo_bjjexems.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { neon: '#00FFD1', darkbg: '#0B1120', cardbg: '#1E293B', panelbg: '#0F172A' } } } }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: var(--darkbg); color: #E2E8F0; }
        .custom-scroll::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .tab-content, .sub-tab-content { display: none; }
        .tab-content.active, .sub-tab-content.active { display: block; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .nav-item.active { background-color: rgba(16, 185, 129, 0.1); border-left: 4px solid #10B981; color: #10B981; }
        .sub-tab-btn.active { border-bottom: 2px solid #10B981; color: #10B981; }
    </style>
</head>
<body class="bg-darkbg h-screen flex overflow-hidden">

    <aside id="sidebar" class="w-64 bg-panelbg border-r border-slate-800 flex flex-col shrink-0">
        <div class="h-20 flex items-center justify-center border-b border-slate-800 px-6">
            <img src="logo_bjjexems.png" alt="BJJ Exams" class="h-10 w-auto">
        </div>
        
        <div class="p-6 text-center border-b border-slate-800/50">
            <div class="w-14 h-14 rounded-full bg-slate-800 border-2 border-emerald-500 mx-auto flex items-center justify-center mb-3 shadow-[0_0_15px_rgba(16,185,129,0.2)]">
                <i class="ph ph-chalkboard-teacher text-3xl text-emerald-500"></i>
            </div>
            <p class="text-sm font-bold text-white truncate" id="prof-nome">Carregando...</p>
            <span class="text-[9px] px-3 py-1 rounded-full uppercase tracking-widest font-black mt-2 inline-block" id="cargo-badge">PROFESSOR</span>
        </div>

        <nav class="flex-1 py-4 flex flex-col gap-1 overflow-y-auto custom-scroll">
            <button onclick="mudarAba(event, 'dashboard')" class="nav-item active flex items-center gap-3 px-6 py-3.5 text-slate-400 hover:text-white transition-all text-sm font-bold w-full text-left">
                <i class="ph ph-chart-pie-slice text-xl"></i> Estatísticas da Equipe
            </button>
            <button onclick="mudarAba(event, 'acompanhamento')" class="nav-item flex items-center gap-3 px-6 py-3.5 text-slate-400 hover:text-white transition-all text-sm font-bold w-full text-left">
                <i class="ph ph-exam text-xl"></i> Acompanhar Provas Ao Vivo
            </button>
            <button onclick="mudarAba(event, 'equipe')" class="nav-item flex items-center gap-3 px-6 py-3.5 text-slate-400 hover:text-white transition-all text-sm font-bold w-full text-left">
                <i class="ph ph-users-three text-xl"></i> Gestão de Alunos
            </button>
        </nav>

        <div class="p-4 border-t border-slate-800">
            <button onclick="fazerLogout()" class="w-full bg-rose-500/10 text-rose-400 border border-rose-500/30 px-4 py-3 rounded-xl text-xs font-bold uppercase transition-all flex items-center justify-center gap-2 hover:bg-rose-500 hover:text-white">
                <i class="ph ph-sign-out text-lg"></i> Sair
            </button>
        </div>
    </aside>

    <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
        <header class="h-20 bg-darkbg/80 backdrop-blur-md border-b border-slate-800 flex items-center px-8 z-10 sticky top-0 justify-between">
            <h1 class="text-xl font-black text-white uppercase tracking-wider" id="titulo-pagina">Estatísticas da Equipe</h1>
            <div class="hidden md:block">
                <span class="text-xs text-slate-400 font-bold uppercase tracking-widest bg-slate-900 border border-slate-700 px-4 py-2 rounded-xl shadow-inner"><i class="ph ph-buildings text-emerald-400"></i> Dojo: <span id="header-equipe" class="text-white">---</span></span>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto custom-scroll p-4 sm:p-8">
            <div class="max-w-6xl mx-auto">

                <div id="dashboard" class="tab-content active">
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-8">
                        <div class="bg-slate-900/50 border border-slate-700/50 p-6 rounded-2xl text-center"><p class="text-[10px] text-amber-400 font-bold uppercase mb-1">Total de Exames</p><h4 class="text-3xl font-black text-white" id="kpi-total">0</h4></div>
                        <div class="bg-slate-900/50 border border-slate-700/50 p-6 rounded-2xl text-center"><p class="text-[10px] text-emerald-400 font-bold uppercase mb-1">Aprovados</p><h4 class="text-3xl font-black text-white" id="kpi-aprovados">0</h4></div>
                        <div class="bg-slate-900/50 border border-slate-700/50 p-6 rounded-2xl text-center"><p class="text-[10px] text-rose-400 font-bold uppercase mb-1">Reprovados</p><h4 class="text-3xl font-black text-white" id="kpi-reprovados">0</h4></div>
                        <div class="bg-slate-900/50 border border-slate-700/50 p-6 rounded-2xl text-center"><p class="text-[10px] text-emerald-500 font-bold uppercase mb-1">Taxa Aprovação</p><h4 class="text-3xl font-black text-white" id="kpi-taxa">0%</h4></div>
                    </div>
                </div>

                <div id="acompanhamento" class="tab-content">
                    <div class="bg-cardbg border border-slate-700/50 rounded-2xl overflow-hidden shadow-xl">
                        <table class="w-full text-left border-collapse text-sm">
                            <thead class="bg-slate-900 text-slate-400 text-[10px] uppercase font-black border-b border-slate-800">
                                <tr>
                                    <th class="p-4">Aluno</th>
                                    <th class="p-4 text-center">Faixa Alvo</th>
                                    <th class="p-4 text-center">Status em Tempo Real</th>
                                    <th class="p-4 text-right">Ação</th>
                                </tr>
                            </thead>
                            <tbody id="tabela-acompanhamento" class="divide-y divide-slate-800">
                                </tbody>
                        </table>
                    </div>
                </div>

                <div id="equipe" class="tab-content">
                    <div class="flex gap-6 mb-6 border-b border-slate-800 overflow-x-auto custom-scroll">
                        <button onclick="mudarSubAba(event, 'eq-ativos')" class="sub-tab-btn active pb-3 text-sm font-bold text-slate-400 uppercase tracking-widest transition-colors whitespace-nowrap">🥋 Alunos Ativos</button>
                        <button onclick="mudarSubAba(event, 'eq-pendentes')" class="sub-tab-btn pb-3 text-sm font-bold text-slate-400 uppercase tracking-widest transition-colors whitespace-nowrap">⏳ Solicitações de Entrada</button>
                    </div>
                    
                    <div id="eq-ativos" class="sub-tab-content active space-y-4">
                        <div class="bg-cardbg border border-slate-700/50 rounded-2xl overflow-hidden shadow-xl">
                            <table class="w-full text-left border-collapse text-sm"><thead class="bg-slate-900 text-slate-400 text-[10px] uppercase font-black border-b border-slate-800"><tr><th class="p-4">Aluno</th><th class="p-4">Faixa Atual</th></tr></thead><tbody id="tabela-alunos-ativos" class="divide-y divide-slate-800"></tbody></table>
                        </div>
                    </div>
                    <div id="eq-pendentes" class="sub-tab-content space-y-4">
                        <div id="lista-alunos-pendentes" class="space-y-4"></div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, getDocs, updateDoc, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // CONEXÃO OFICIAL BJJ-MANAGER
        const firebaseConfig = { apiKey: "AIzaSyAkIk25LZptKw_N_UJsDO418IwMZNZXBeI", authDomain: "bjj-maneger.firebaseapp.com", projectId: "bjj-maneger", storageBucket: "bjj-maneger.firebasestorage.app", messagingSenderId: "415548255893", appId: "1:415548255893:web:fdeaed80aeff3bae70759c" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let profGlobal = null; let equipeIdGlobal = null; let nivelPoder = 1; let listenerAcompanhamento = null;

        window.mudarAba = (evt, tabName) => {
            document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
            document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");
            document.getElementById('titulo-pagina').innerText = evt.currentTarget.innerText;
            if(tabName === 'acompanhamento') iniciarTrackingExamesAoVivo();
        };

        window.mudarSubAba = (evt, tabName) => {
            const parent = evt.currentTarget.closest('.tab-content');
            parent.querySelectorAll(".sub-tab-content").forEach(t => t.classList.remove("active"));
            parent.querySelectorAll(".sub-tab-btn").forEach(n => n.classList.remove("active"));
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const uDoc = await getDoc(doc(db, "usuarios", user.uid));
                if(uDoc.exists()) {
                    profGlobal = { id: user.uid, ...uDoc.data() };
                    document.getElementById('prof-nome').innerText = profGlobal.nome;
                    
                    const vSnap = await getDocs(query(collection(db, "professores"), where("usuario_id", "==", user.uid), where("status_vinculo", "==", "ativo")));
                    if(!vSnap.empty) {
                        const v = vSnap.docs[0].data();
                        equipeIdGlobal = v.equipe_id;
                        
                        if(v.eh_responsavel) {
                            nivelPoder = 3; document.getElementById('cargo-badge').innerText = "👑 PROFESSOR LÍDER"; document.getElementById('cargo-badge').className = "text-[9px] bg-amber-500/20 text-amber-400 px-3 py-1 rounded-full uppercase font-black mt-2 inline-block border border-amber-500/30";
                        } else {
                            nivelPoder = 2; document.getElementById('cargo-badge').innerText = "🛡️ DELEGADO"; document.getElementById('cargo-badge').className = "text-[9px] bg-blue-500/20 text-blue-400 px-3 py-1 rounded-full uppercase font-black mt-2 inline-block border border-blue-500/30";
                        }

                        const eqDoc = await getDoc(doc(db, "equipes", equipeIdGlobal));
                        if(eqDoc.exists()) document.getElementById('header-equipe').innerText = eqDoc.data().nome;

                        carregarGestaoEquipe();
                    } else { alert("Sua conta de professor ainda não foi vinculada à academia."); }
                }
            } else { window.location.href = "login.html"; }
        });

        // GESTÃO DE ALUNOS
        async function carregarGestaoEquipe() {
            const snapAlunos = await getDocs(query(collection(db, "alunos"), where("equipe_id", "==", equipeIdGlobal)));
            let ativosHtml = ''; let pendentesHtml = '';
            
            snapAlunos.forEach(d => {
                const a = { id: d.id, ...d.data() };
                if(a.status_vinculo === 'pendente') {
                    pendentesHtml += `<div class="bg-slate-900 border border-slate-800 p-4 rounded-xl flex justify-between items-center"><div><h4 class="text-sm font-bold text-white">${a.nome || 'Aluno'}</h4><p class="text-[10px] text-slate-500 uppercase">Faixa: ${a.faixa_atual || a.faixa || 'Branca'}</p></div><button onclick="responderPendencia('${a.id}', 'ativo')" class="text-emerald-400 bg-emerald-500/10 px-4 py-2 rounded-lg text-xs font-black uppercase hover:bg-emerald-500 hover:text-slate-900">Aceitar na Equipe</button></div>`;
                } else {
                    ativosHtml += `<tr class="hover:bg-slate-800/30"><td class="p-4 font-bold text-white">${a.nome || 'Aluno'}</td><td class="p-4"><span class="text-xs bg-slate-800 px-3 py-1 rounded-lg text-slate-300 font-bold uppercase">${a.faixa_atual || a.faixa || 'Branca'}</span></td></tr>`;
                }
            });
            
            document.getElementById('tabela-alunos-ativos').innerHTML = ativosHtml || '<tr><td colspan="2" class="p-4 text-center text-slate-500">Nenhum aluno ativo.</td></tr>';
            document.getElementById('lista-alunos-pendentes').innerHTML = pendentesHtml || '<p class="text-slate-500 text-sm">Nenhuma solicitação no momento.</p>';
        }
        
        window.responderPendencia = async (id, status) => { await updateDoc(doc(db, "alunos", id), { status_vinculo: status }); carregarGestaoEquipe(); };

        // ACOMPANHAR EXAMES AO VIVO
        function iniciarTrackingExamesAoVivo() {
            if(listenerAcompanhamento) listenerAcompanhamento(); 
            const qAlunos = query(collection(db, "alunos"), where("equipe_id", "==", equipeIdGlobal), where("status_vinculo", "==", "ativo"));
            
            listenerAcompanhamento = onSnapshot(qAlunos, (snap) => {
                let htmlTabela = '';
                snap.forEach(d => {
                    const a = d.data(); const id = d.id;
                    const hab = a.exame_habilitado;
                    const stt = a.status_exame || 'pendente';
                    const emAndamento = a.status_exame_em_andamento;

                    let corBg = "bg-slate-800", corTxt = "text-slate-500", txtStatus = "BLOQUEADO", iconStatus = "🔒";
                    
                    if (emAndamento) { corBg = "bg-emerald-500/20 border border-emerald-500/50 animate-pulse"; corTxt = "text-emerald-400"; txtStatus = "FAZENDO PROVA"; iconStatus = "⏱️"; } 
                    else if (stt === 'aprovado') { corBg = "bg-emerald-500/10"; corTxt = "text-emerald-500"; txtStatus = "APROVADO"; iconStatus = "🏆"; } 
                    else if (stt === 'reprovado') { corBg = "bg-rose-500/10"; corTxt = "text-rose-400"; txtStatus = "REPROVADO"; iconStatus = "🔴"; } 
                    else if (hab) { corBg = "bg-emerald-500/10"; corTxt = "text-emerald-500"; txtStatus = "AUTORIZADO"; iconStatus = "🟢"; }

                    htmlTabela += `
                        <tr class="hover:bg-slate-800/30 transition-colors">
                            <td class="p-4 font-bold text-white">${a.nome || 'Aluno'} <br><span class="text-[9px] text-slate-500 uppercase font-normal">Faixa Atual: ${a.faixa_atual || 'Branca'}</span></td>
                            <td class="p-4 text-center">
                                <select id="faixa-alvo-${id}" class="bg-slate-900 border border-slate-700 text-xs p-2 rounded outline-none focus:border-emerald-500 text-white" ${hab || emAndamento ? 'disabled' : ''}>
                                    <option value="Branca" ${a.faixa_exame==='Branca'?'selected':''}>Branca</option>
                                    <option value="Azul" ${a.faixa_exame==='Azul'?'selected':''}>Azul</option>
                                    <option value="Roxa" ${a.faixa_exame==='Roxa'?'selected':''}>Roxa</option>
                                    <option value="Marrom" ${a.faixa_exame==='Marrom'?'selected':''}>Marrom</option>
                                    <option value="Preta" ${a.faixa_exame==='Preta'?'selected':''}>Preta</option>
                                </select>
                            </td>
                            <td class="p-4 text-center"><span class="text-[10px] font-black px-3 py-1.5 rounded-lg flex items-center justify-center gap-2 w-max mx-auto ${corBg} ${corTxt}">${iconStatus} ${txtStatus}</span></td>
                            <td class="p-4 text-right">
                                <button onclick="toggleHabilitacao('${id}', ${!hab})" class="text-[10px] font-black uppercase tracking-widest px-4 py-2 rounded-lg shadow-lg transition-all ${hab || emAndamento ? 'bg-rose-500/10 text-rose-500 hover:bg-rose-500 hover:text-white' : 'bg-emerald-500 text-slate-900 hover:bg-white'}" ${(stt === 'aprovado' || emAndamento) ? 'disabled' : ''}>
                                    ${hab || emAndamento ? '🔒 Revogar' : '✅ Autorizar Exame'}
                                </button>
                            </td>
                        </tr>`;
                });
                document.getElementById('tabela-acompanhamento').innerHTML = htmlTabela || '<tr><td colspan="4" class="p-4 text-center text-slate-500">Nenhum aluno encontrado.</td></tr>';
            });
        }

        window.toggleHabilitacao = async (id, statusAutorizar) => {
            const faixaAlvo = document.getElementById(`faixa-alvo-${id}`).value;
            let updateData = { exame_habilitado: statusAutorizar, faixa_exame: faixaAlvo, status_exame_em_andamento: false };
            if(statusAutorizar) updateData.status_exame = 'pendente';
            await updateDoc(doc(db, "alunos", id), updateData);
        };

        window.fazerLogout = () => signOut(auth).then(()=>window.location.href="login.html");
    </script>
</body>
</html>
