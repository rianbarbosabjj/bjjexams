<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso ao Sistema | BJJ Exams</title>
    
    <link rel="icon" type="image/png" href="logo_bjjexems.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        neon: '#00FFD1',
                        neondark: '#08b394'
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .bg-pattern { background-image: radial-gradient(#334155 1px, transparent 1px); background-size: 20px 20px; }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4 relative overflow-hidden selection:bg-neon selection:text-slate-900">
    
    <div class="absolute inset-0 bg-pattern opacity-30"></div>
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-2xl h-64 bg-neon/10 blur-[120px] rounded-full pointer-events-none"></div>
    
    <div id="toast-container" class="fixed top-5 right-5 z-[100] flex flex-col gap-3 pointer-events-none"></div>
    
    <div class="w-full max-w-md bg-slate-800/80 backdrop-blur-xl border border-slate-700 p-8 rounded-3xl shadow-2xl relative z-10">        
        
        <div class="text-center mb-8">
            <a class='inline-block transition-transform hover:scale-105 mb-4' href='#'>
                <img src="logo_bjjexems.png" alt="Logo BJJ Exams" class="h-24 w-auto mx-auto filter drop-shadow-[0_0_15px_rgba(0,255,209,0.4)]">
            </a>
            <h2 class="text-2xl font-black text-white uppercase tracking-wider">BJJ Exams</h2>
            <p class="text-[10px] text-neon mt-1 uppercase font-black tracking-[0.2em]">Área do Aluno</p>
        </div>

        <form id="form-login" class="space-y-5" onsubmit="event.preventDefault(); fazerLogin();">
            <div class="space-y-1.5">
                <label class="text-[10px] font-black text-slate-400 uppercase ml-2">E-mail</label>
                <input type="email" id="login-email" required class="w-full px-5 py-4 bg-slate-900 border border-slate-700 rounded-2xl text-white outline-none focus:border-neon transition-all placeholder:text-slate-600" placeholder="seu@email.com.br">
            </div>
            
            <div class="space-y-1.5">
                <div class="flex justify-between items-center ml-2 mr-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase">Senha</label>
                    <button type="button" onclick="recuperarSenha()" class="text-[10px] font-bold text-neon hover:text-neondark hover:underline transition-colors">Esqueci a senha</button>
                </div>
                <div class="relative">
                    <input type="password" id="login-senha" required class="w-full px-5 py-4 bg-slate-900 border border-slate-700 rounded-2xl text-white outline-none focus:border-neon transition-all pr-12 placeholder:text-slate-600" placeholder="••••••••">
                    <button type="button" onclick="toggleSenha('login-senha', this)" class="absolute inset-y-0 right-4 flex items-center text-slate-400 hover:text-neon transition-colors outline-none">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
                        </svg>
                    </button>
                </div>
            </div>
            
            <button type="submit" id="btn-login" class="w-full bg-neon text-slate-900 hover:bg-white font-black py-4 rounded-2xl transition-all shadow-[0_0_15px_rgba(0,255,209,0.3)] uppercase tracking-widest text-xs transform hover:-translate-y-0.5">
                Entrar
            </button>

            <div class="relative flex items-center justify-center mt-6 mb-4">
                <div class="border-t border-slate-700 w-full"></div>
                <span class="bg-slate-800 px-3 text-[9px] font-black text-slate-500 uppercase tracking-widest absolute">Ou</span>
            </div>

            <button type="button" onclick="loginComGoogle()" id="btn-google" class="w-full bg-white hover:bg-slate-200 text-slate-800 font-black py-3.5 rounded-2xl transition-all shadow-sm flex items-center justify-center gap-3 uppercase tracking-widest text-xs">
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Entrar com Google
            </button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"; 

        // CONFIGURAÇÃO REAL DO PROJETO BJJ-DIGITAL
        const firebaseConfig = {
            apiKey: "AIzaSyAkIk25LZptKw_N_UJsDO418IwMZNZXBeI",
            authDomain: "bjj-maneger.firebaseapp.com",
            projectId: "bjj-maneger",
            storageBucket: "bjj-maneger.firebasestorage.app",
            messagingSenderId: "415548255893",
            appId: "1:415548255893:web:fdeaed80aeff3bae70759c",
            measurementId: "G-PLB2PT4JH4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        
        // CONEXÃO COM O BANCO ESPECÍFICO
        const db = getFirestore(app, "bjj-digital");

        window.showToast = function(message, type = 'error') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-emerald-500' : 'bg-rose-500';
            toast.className = `${bgColor} text-white px-6 py-4 rounded-2xl shadow-2xl transition-all duration-300 flex items-center gap-3 font-bold text-sm pointer-events-auto`;
            toast.innerHTML = `<span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        window.toggleSenha = function(inputId, btnElement) {
            const input = document.getElementById(inputId);
            input.type = input.type === "password" ? "text" : "password";
        }

        window.fazerLogin = async function() {
            const email = document.getElementById('login-email').value;
            const senha = document.getElementById('login-senha').value;
            const btn = document.getElementById('btn-login');
            
            btn.disabled = true; btn.innerText = "Verificando...";
            
            try {
                await signInWithEmailAndPassword(auth, email, senha);
                window.location.href = "painel_aluno.html";
            } catch (e) {
                showToast("E-mail ou senha incorretos.");
                btn.disabled = false; btn.innerText = "Entrar";
            }
        }

        window.loginComGoogle = async function() {
            try {
                const provider = new GoogleAuthProvider();
                const result = await signInWithPopup(auth, provider);
                const user = result.user;

                // Verifica se o aluno já existe na coleção 'usuarios'
                const userDoc = await getDoc(doc(db, "usuarios", user.uid));

                if (!userDoc.exists()) {
                    await setDoc(doc(db, "usuarios", user.uid), {
                        nome: user.displayName.toUpperCase(),
                        email: user.email.toLowerCase(),
                        tipo_usuario: "aluno",
                        perfil_completo: false,
                        data_criacao: serverTimestamp()
                    });
                }
                window.location.href = "painel_aluno.html";
            } catch (error) {
                showToast("Erro ao conectar com Google.");
            }
        }

        window.recuperarSenha = async function() {
            const email = document.getElementById('login-email').value;
            if(!email) return showToast("Digite seu e-mail primeiro.");
            try {
                await sendPasswordResetEmail(auth, email);
                showToast("E-mail de recuperação enviado!", "success");
            } catch (e) {
                showToast("Erro ao enviar e-mail.");
            }
        }
    </script>
</body>
</html>
