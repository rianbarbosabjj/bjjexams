<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | BJJ Exams</title>
    <link rel="icon" type="image/png" href="logo_bjjexems.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { neon: '#00FFD1', darkbg: '#0B1120', cardbg: '#1E293B' } } } }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: var(--darkbg); color: #E2E8F0; }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-darkbg h-screen flex items-center justify-center relative overflow-hidden selection:bg-neon selection:text-slate-900 p-4">

    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-neon/10 rounded-full blur-[100px] pointer-events-none"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-emerald-500/10 rounded-full blur-[100px] pointer-events-none"></div>

    <div class="w-full max-w-2xl z-10 flex flex-col max-h-full">
        
        <div class="text-center mb-6 shrink-0 fade-in mt-4">
            <img src="logo_bjjexems.png" alt="BJJ Exams" class="h-16 mx-auto filter drop-shadow-[0_0_15px_rgba(0,255,209,0.4)] mb-4" onerror="this.outerHTML='<h1 class=\'text-4xl font-black text-neon tracking-widest uppercase\'>BJJ EXAMS</h1>'">
            <p class="text-slate-400 text-sm font-bold tracking-widest uppercase">Plataforma Oficial de Certificação EAD</p>
        </div>

        <div class="bg-cardbg border border-slate-700/50 p-6 sm:p-8 rounded-3xl shadow-2xl relative overflow-hidden fade-in flex flex-col min-h-0">
            
            <div id="container-abas" class="flex gap-4 mb-6 border-b border-slate-700/50 pb-4 shrink-0">
                <button id="tab-login" onclick="mudarAba('login')" class="flex-1 pb-2 text-sm font-black uppercase tracking-widest text-neon border-b-2 border-neon transition-all">Entrar</button>
                <button id="tab-cadastro" onclick="mudarAba('cadastro')" class="flex-1 pb-2 text-sm font-black uppercase tracking-widest text-slate-500 border-b-2 border-transparent hover:text-slate-300 transition-all">Criar Conta</button>
            </div>

            <div class="overflow-y-auto custom-scroll pr-2 flex-1">
                
                <div id="form-login" class="max-w-md mx-auto mt-4">
                    <form onsubmit="fazerLogin(event)" class="space-y-5">
                        <div>
                            <label class="text-[10px] text-slate-400 uppercase font-bold ml-2">E-mail</label>
                            <div class="relative mt-1">
                                <i class="ph ph-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i>
                                <input type="email" id="login-email" required class="w-full pl-12 pr-4 py-4 bg-slate-900 border border-slate-700 rounded-2xl text-white outline-none focus:border-neon transition-colors" placeholder="seu@email.com">
                            </div>
                        </div>
                        <div>
                            <div class="flex justify-between items-center ml-2">
                                <label class="text-[10px] text-slate-400 uppercase font-bold">Senha</label>
                                <button type="button" onclick="recuperarSenha()" class="text-[10px] text-neon hover:text-white font-bold uppercase tracking-wider transition-colors">Esqueceu?</button>
                            </div>
                            <div class="relative mt-1">
                                <i class="ph ph-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i>
                                <input type="password" id="login-senha" required class="w-full pl-12 pr-4 py-4 bg-slate-900 border border-slate-700 rounded-2xl text-white outline-none focus:border-neon transition-colors" placeholder="••••••••">
                            </div>
                        </div>
                        <button type="submit" id="btn-login" class="bg-neon text-slate-900 font-black w-full py-4 rounded-2xl uppercase tracking-widest text-xs shadow-[0_0_15px_rgba(0,255,209,0.2)] hover:bg-white hover:shadow-none transition-all mt-4">Acessar Painel</button>
                    </form>

                    <div class="flex items-center my-6 before:flex-1 before:border-t before:border-slate-700 after:flex-1 after:border-t after:border-slate-700">
                        <span class="text-center font-bold text-[10px] text-slate-500 uppercase px-4">Ou</span>
                    </div>
                    
                    <button type="button" onclick="loginComGoogle()" class="w-full bg-white text-slate-900 font-black py-4 rounded-2xl uppercase tracking-widest text-xs shadow-lg hover:bg-slate-200 transition-all flex items-center justify-center gap-3">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5" alt="Google">
                        Continuar com o Google
                    </button>
                </div>

                <form id="form-cadastro" onsubmit="criarConta(event)" class="space-y-6 hidden pb-4">
                    <div class="bg-slate-800/30 p-4 rounded-2xl border border-slate-700/50 mb-4">
                        <label class="text-[10px] text-neon uppercase font-bold ml-2 block mb-2">Qual o seu perfil?</label>
                        <select id="cad-tipo" onchange="toggleCamposPerfil('cad')" required class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-white outline-none focus:border-neon appearance-none text-sm font-bold">
                            <option value="aluno">Sou Aluno(a)</option>
                            <option value="professor">Sou Professor(a)</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div><label class="text-[10px] text-slate-400 uppercase font-bold ml-2">Nome Completo</label><input type="text" id="cad-nome" required class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-white outline-none focus:border-emerald-500 mt-1 text-sm"></div>
                        <div><label class="text-[10px] text-slate-400 uppercase font-bold ml-2">CPF</label><input type="text" id="cad-cpf" required class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-white outline-none focus:border-emerald-500 mt-1 text-sm" placeholder="000.000.000-00"></div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div><label class="text-[10px] text-slate-400 uppercase font-bold ml-2">Sua Graduação</label><select id="cad-faixa" required class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-white outline-none focus:border-emerald-500 mt-1 text-sm appearance-none"></select></div>
                        <div>
                            <label class="text-[10px] text-slate-400 uppercase font-bold ml-2">Equipe / Academia *</label>
                            <select id="cad-equipe" onchange="verificarNovaEquipe('cad')" required class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-white outline-none focus:border-emerald-500 mt-1 text-sm appearance-none">
                                <option value="" disabled selected>Carregando equipes...</option>
                            </select>
                            <input type="text" id="cad-nova-equipe" placeholder="Nome da Nova Equipe *" class="w-full px-4 py-3 bg-slate-900 border border-emerald-500 rounded-xl text-white outline-none mt-2 text-sm hidden transition-all">
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 border-t border-slate-800 pt-4">
                        <div><label class="text-[10px] text-slate-400 uppercase font-bold ml-2">E-mail</label><input type="email" id="cad-email" required class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-white outline-none focus:border-emerald-500 mt-1 text-sm"></div>
                        <div><label class="text-[10px] text-slate-400 uppercase font-bold ml-2">Senha</label><input type="password" id="cad-senha" required minlength="6" class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-white outline-none focus:border-emerald-500 mt-1 text-sm"></div>
                    </div>
                    <button type="submit" id="btn-cad" class="bg-emerald-500 text-slate-900 font-black w-full py-4 rounded-xl uppercase tracking-widest text-xs shadow-[0_0_15px_rgba(16,185,129,0.2)] hover:bg-white hover:shadow-none transition-all mt-6">Criar Conta na Plataforma</button>
                </form>

                <form id="form-completar-google" onsubmit="finalizarCadastroGoogle(event)" class="space-y-6 hidden pb-4">
                    <div class="text-center mb-6 border-b border-slate-700 pb-6">
                        <div class="w-16 h-16 rounded-full bg-slate-800 mx-auto flex items-center justify-center mb-3"><i class="ph ph-google-logo text-3xl text-white"></i></div>
                        <h2 class="text-xl font-black text-white uppercase tracking-widest">Finalizar Cadastro</h2>
                        <p class="text-sm text-slate-400 mt-2">A sua conta Google foi vinculada! Precisamos de mais alguns dados.</p>
                    </div>
                    <div class="bg-slate-800/30 p-4 rounded-2xl border border-slate-700/50 mb-4">
                        <label class="text-[10px] text-neon uppercase font-bold ml-2 block mb-2">Qual o seu perfil?</label>
                        <select id="g-tipo" onchange="toggleCamposPerfil('g')" required class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-white outline-none focus:border-neon appearance-none text-sm font-bold">
                            <option value="aluno">Sou Aluno(a)</option>
                            <option value="professor">Sou Professor(a)</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div><label class="text-[10px] text-slate-400 uppercase font-bold ml-2">Nome (Google)</label><input type="text" id="g-nome" required class="w-full px-4 py-3 bg-slate-900/50 border border-slate-700 rounded-xl text-slate-400 outline-none mt-1 text-sm" readonly></div>
                        <div><label class="text-[10px] text-slate-400 uppercase font-bold ml-2">CPF *</label><input type="text" id="g-cpf" required class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-white outline-none focus:border-neon mt-1 text-sm" placeholder="000.000.000-00"></div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div><label class="text-[10px] text-slate-400 uppercase font-bold ml-2">Sua Graduação *</label><select id="g-faixa" required class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-white outline-none focus:border-neon mt-1 text-sm appearance-none"></select></div>
                        <div>
                            <label class="text-[10px] text-slate-400 uppercase font-bold ml-2">Equipe / Academia *</label>
                            <select id="g-equipe" onchange="verificarNovaEquipe('g')" required class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-white outline-none focus:border-neon mt-1 text-sm appearance-none">
                                <option value="" disabled selected>Carregando equipes...</option>
                            </select>
                            <input type="text" id="g-nova-equipe" placeholder="Nome da Nova Equipe *" class="w-full px-4 py-3 bg-slate-900 border border-neon rounded-xl text-white outline-none mt-2 text-sm hidden transition-all">
                        </div>
                    </div>
                    <button type="submit" id="btn-g-cad" class="bg-white text-slate-900 font-black w-full py-4 rounded-xl uppercase tracking-widest text-xs shadow-lg hover:bg-slate-200 transition-all mt-6 flex items-center justify-center gap-2"><i class="ph ph-check-circle text-lg"></i> Concluir Acesso</button>
                    <button type="button" onclick="fazerLogout()" class="w-full text-slate-500 font-bold text-xs uppercase tracking-widest hover:text-rose-400 mt-4">Cancelar</button>
                </form>

            </div>
        </div>
        
        <div id="mensagem-erro" class="mt-4 shrink-0 text-center text-rose-400 font-bold text-xs uppercase tracking-widest hidden bg-rose-500/10 py-3 rounded-xl border border-rose-500/30 fade-in"></div>
        <div id="mensagem-sucesso" class="mt-4 shrink-0 text-center text-emerald-400 font-bold text-xs uppercase tracking-widest hidden bg-emerald-500/10 py-3 rounded-xl border border-emerald-500/30 fade-in"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection, getDocs, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"; 

        const firebaseConfig = { 
            apiKey: "AIzaSyAkIk25LZptKw_N_UJsDO418IwMZNZXBeI", 
            authDomain: "bjj-maneger.firebaseapp.com", 
            projectId: "bjj-maneger", 
            storageBucket: "bjj-maneger.firebasestorage.app", 
            messagingSenderId: "415548255893", 
            appId: "1:415548255893:web:fdeaed80aeff3bae70759c" 
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();

        let usuarioPendenteGoogle = null; 
        let cacheEquipes = [];

        const faixasCompletas = ["Branca", "Cinza e Branca", "Cinza", "Cinza e Preta", "Amarela e Branca", "Amarela", "Amarela e Preta", "Laranja e Branca", "Laranja", "Laranja e Preta", "Verde e Branca", "Verde", "Verde e Preta", "Azul", "Roxa", "Marrom", "Preta"];
        const faixasProfessor = ["Marrom", "Preta"];

        async function carregarEquipes() {
            try {
                if (!db) return;
                const snap = await getDocs(collection(db, "equipes"));
                cacheEquipes = snap.docs.map(d => ({ 
                    id: d.id, 
                    nome: d.data().nome_equipe || d.data().nome || "Equipe Sem Nome" 
                })).sort((a, b) => a.nome.localeCompare(b.nome));
            
                renderizarSelectEquipes('cad');
                renderizarSelectEquipes('g');
            } catch (error) { 
                console.error("Erro ao carregar equipes:", error);
            }
        }
        carregarEquipes();

        function renderizarSelectEquipes(prefix) {
            const select = document.getElementById(`${prefix}-equipe`);
            if(!select) return;
            const tipoUser = document.getElementById(`${prefix}-tipo`).value;
            
            let html = '<option value="" disabled selected>Selecione a academia...</option>';
            cacheEquipes.forEach(eq => { html += `<option value="${eq.id}">${eq.nome}</option>`; });

            if (tipoUser === 'professor') {
                html += `<option value="nova_equipe">➕ Criar Nova Equipe</option>`;
            }
            
            select.innerHTML = html;
            verificarNovaEquipe(prefix);
        }

        window.verificarNovaEquipe = (prefix) => {
            const select = document.getElementById(`${prefix}-equipe`);
            const inputNova = document.getElementById(`${prefix}-nova-equipe`);
            if (select.value === 'nova_equipe') {
                inputNova.classList.remove('hidden');
                inputNova.required = true;
            } else {
                inputNova.classList.add('hidden');
                inputNova.required = false;
                inputNova.value = '';
            }
        };

        window.toggleCamposPerfil = (prefix) => {
            const tipo = document.getElementById(`${prefix}-tipo`).value;
            const selectFaixa = document.getElementById(`${prefix}-faixa`);
            selectFaixa.innerHTML = '<option value="" disabled selected>Selecione a graduação...</option>';
            const lista = tipo === 'professor' ? faixasProfessor : faixasCompletas;
            lista.forEach(f => { selectFaixa.innerHTML += `<option value="${f}">${f}</option>`; });
            renderizarSelectEquipes(prefix);
        };
        
        setTimeout(() => { toggleCamposPerfil('cad'); toggleCamposPerfil('g'); }, 100);

        window.mudarAba = (aba) => {
            document.getElementById('form-login').classList.add('hidden');
            document.getElementById('form-cadastro').classList.add('hidden');
            document.getElementById('form-completar-google').classList.add('hidden');
            document.getElementById('container-abas').classList.remove('hidden');
            document.getElementById('mensagem-erro').classList.add('hidden');
            document.getElementById('mensagem-sucesso').classList.add('hidden');

            if (aba === 'login') {
                document.getElementById('form-login').classList.remove('hidden');
                document.getElementById('tab-login').className = "flex-1 pb-2 text-sm font-black uppercase tracking-widest text-neon border-b-2 border-neon transition-all";
                document.getElementById('tab-cadastro').className = "flex-1 pb-2 text-sm font-black uppercase tracking-widest text-slate-500 border-b-2 border-transparent hover:text-slate-300 transition-all";
            } else {
                document.getElementById('form-cadastro').classList.remove('hidden');
                document.getElementById('tab-cadastro').className = "flex-1 pb-2 text-sm font-black uppercase tracking-widest text-emerald-400 border-b-2 border-emerald-400 transition-all";
                document.getElementById('tab-login').className = "flex-1 pb-2 text-sm font-black uppercase tracking-widest text-slate-500 border-b-2 border-transparent hover:text-slate-300 transition-all";
            }
        };

        const mostrarErro = (msg) => { const div = document.getElementById('mensagem-erro'); div.innerText = msg; div.classList.remove('hidden'); document.getElementById('mensagem-sucesso').classList.add('hidden'); };
        const mostrarSucesso = (msg) => { const div = document.getElementById('mensagem-sucesso'); div.innerText = msg; div.classList.remove('hidden'); document.getElementById('mensagem-erro').classList.add('hidden'); };
        window.fazerLogout = () => { signOut(auth).then(() => window.location.reload()); };

        const rotearUsuario = async (user) => {
            const uid = user.uid;
            try {
                const [superSnap, userDocSnap] = await Promise.all([
                    getDoc(doc(db, "super_admins", uid)).catch(() => ({ exists: () => false })),
                    getDoc(doc(db, "usuarios", uid)).catch(() => ({ exists: () => false }))
                ]);

                const userData = userDocSnap.exists() ? userDocSnap.data() : null;
                const tipo = userData ? userData.tipo_usuario : null;

                // 1. SUPORTE / GOD MODE -> Vai para o Painel Admin (SuperAdmin)
                if (superSnap.exists() || tipo === 'superadmin') { 
                    window.location.href = "painel_admin.html"; 
                    return; 
                }
                
                // 2. PROFESSOR RESPONSÁVEL OU INSTRUTOR -> Vão para o Painel Professor
                if (tipo === 'admin' || tipo === 'professor') {
                    window.location.href = "painel_professor.html"; 
                    return;
                }
                
                // 3. ALUNO -> Vai para o Painel Aluno
                if (tipo === 'aluno') { 
                    window.location.href = "painel_aluno.html"; 
                    return; 
                }

                // Se não tem perfil definido, pede para completar o cadastro
                usuarioPendenteGoogle = user;
                document.getElementById('container-abas').classList.add('hidden');
                document.getElementById('form-login').classList.add('hidden');
                document.getElementById('form-cadastro').classList.add('hidden');
                document.getElementById('form-completar-google').classList.remove('hidden');
                document.getElementById('g-nome').value = user.displayName || "";

            } catch (error) { mostrarErro("Erro de sincronização."); }
        };

        onAuthStateChanged(auth, async (user) => { 
            if (user && !usuarioPendenteGoogle) {
                await rotearUsuario(user); 
            }
        });

        window.loginComGoogle = async () => {
            document.getElementById('mensagem-erro').classList.add('hidden');
            try { await signInWithPopup(auth, googleProvider); } 
            catch (error) { if(error.code !== 'auth/popup-closed-by-user') mostrarErro("Erro ao conectar com Google."); }
        };

        // --- CORREÇÃO DA LÓGICA DE ATRIBUIÇÃO DE ADMIN ---
        const salvarPerfilNoBanco = async (uid, email, prefixo, authProvider) => {
            const tipoUserBase = document.getElementById(`${prefixo}-tipo`).value; // aluno ou professor
            const selectEquipe = document.getElementById(`${prefixo}-equipe`).value;
            const isNovaEquipe = (selectEquipe === 'nova_equipe');
            
            let idEquipeFinal = selectEquipe;
            let nomeEquipeFinal = "";

            if (isNovaEquipe) {
                nomeEquipeFinal = document.getElementById(`${prefixo}-nova-equipe`).value.toUpperCase();
                const novaEqRef = await addDoc(collection(db, "equipes"), { nome: nomeEquipeFinal, criado_em: serverTimestamp() });
                idEquipeFinal = novaEqRef.id;
            } else {
                const eqInfo = cacheEquipes.find(e => e.id === idEquipeFinal);
                nomeEquipeFinal = eqInfo ? eqInfo.nome : "Desconhecida";
            }

            const perfilData = {
                nome: document.getElementById(`${prefixo}-nome`).value.toUpperCase(),
                email: email.toLowerCase(),
                cpf: document.getElementById(`${prefixo}-cpf`).value,
                faixa: document.getElementById(`${prefixo}-faixa`).value,
                faixa_atual: document.getElementById(`${prefixo}-faixa`).value,
                equipe_id: idEquipeFinal,
                equipe_origem: nomeEquipeFinal,
                data_cadastro: serverTimestamp(),
                auth_provider: authProvider
            };

            // SEPARAÇÃO CORRETA DE PERFIS E STATUS DE VÍNCULO
            if (tipoUserBase === 'aluno') {
                perfilData.tipo_usuario = 'aluno';
                perfilData.exame_habilitado = false;
                perfilData.status_vinculo = 'pendente'; 
                await setDoc(doc(db, "alunos", uid), perfilData);
            } else {
                // Se ele criou a equipe, ele é o Admin (Líder). Se entrou numa existente, é Professor comum.
                perfilData.tipo_usuario = isNovaEquipe ? 'admin' : 'professor';
                perfilData.status_vinculo = isNovaEquipe ? 'ativo' : 'pendente';
                
                await setDoc(doc(db, "usuarios", uid), perfilData);
                
                await setDoc(doc(db, "colaboradores", uid), { nome: perfilData.nome, email: email, tipo: "professor" });
                
                // Salvando as permissões internas na coleção de professores
                await setDoc(doc(db, "professores", uid), {
                    usuario_id: uid,
                    equipe_id: idEquipeFinal,
                    status_vinculo: isNovaEquipe ? "ativo" : "pendente",
                    eh_responsavel: isNovaEquipe, // Se criou a equipe, ganha a coroa automaticamente
                    pode_aprovar: isNovaEquipe    // Ganha o poder de aprovar
                });
            }
        };

        window.finalizarCadastroGoogle = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-g-cad'); btn.innerText = "Salvando..."; btn.disabled = true;
            try {
                await salvarPerfilNoBanco(usuarioPendenteGoogle.uid, usuarioPendenteGoogle.email, 'g', 'google');
                usuarioPendenteGoogle = null; 
                await rotearUsuario(auth.currentUser);
            } catch (err) { mostrarErro("Erro ao salvar perfil."); btn.innerText = "Concluir Acesso"; btn.disabled = false; }
        };

        window.fazerLogin = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-login'); btn.innerText = "Autenticando..."; btn.disabled = true;
            document.getElementById('mensagem-erro').classList.add('hidden');
            
            try { 
                await signInWithEmailAndPassword(auth, document.getElementById('login-email').value, document.getElementById('login-senha').value); 
            } catch (error) { 
                if(error.code === 'auth/invalid-credential') mostrarErro("E-mail ou senha incorretos.");
                else mostrarErro("Erro: " + error.code);
                btn.innerText = "Acessar Painel"; btn.disabled = false; 
            }
        };

        window.criarConta = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-cad');
            const senha = document.getElementById('cad-senha').value;
            const email = document.getElementById('cad-email').value.toLowerCase();
            
            if (!document.getElementById('cad-faixa').value) return mostrarErro("Selecione a sua graduação.");

            btn.innerText = "Processando Cadastro..."; btn.disabled = true;
            document.getElementById('mensagem-erro').classList.add('hidden');
            
            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, senha);
                await salvarPerfilNoBanco(userCredential.user.uid, email, 'cad', 'local');
                // O onAuthStateChanged vai pegar o novo login automaticamente e chamar rotearUsuario
            } catch (error) {
                if(error.code === 'auth/email-already-in-use') mostrarErro("Este e-mail já está registado.");
                else mostrarErro("Erro: " + error.code);
                btn.innerText = "Criar Conta na Plataforma"; btn.disabled = false;
            }
        };

        window.recuperarSenha = async () => {
            const email = document.getElementById('login-email').value;
            if(!email) { mostrarErro("Para recuperar a senha, digite o seu e-mail no campo acima primeiro."); return; }
            try { await sendPasswordResetEmail(auth, email); mostrarSucesso("E-mail de recuperação enviado para: " + email); } 
            catch (error) { mostrarErro("Erro: " + error.code); }
        };
    </script>
</body>
</html>
