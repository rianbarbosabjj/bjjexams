<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | BJJ Exams</title>
    <link rel="icon" type="image/png" href="logo_bjjexems.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        neon: '#00FFD1',
                        darkbg: '#0B1120',
                        cardbg: '#1E293B'
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: var(--darkbg); color: #E2E8F0; }
        
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-darkbg h-screen flex items-center justify-center relative overflow-hidden selection:bg-neon selection:text-slate-900 p-4">

    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-neon/10 rounded-full blur-[100px] pointer-events-none"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-emerald-500/10 rounded-full blur-[100px] pointer-events-none"></div>

    <div class="w-full max-w-md z-10">
        <div class="text-center mb-8 fade-in">
            <img src="logo_bjjexems.png" alt="BJJ Exams" class="h-16 mx-auto filter drop-shadow-[0_0_15px_rgba(0,255,209,0.4)] mb-4" onerror="this.outerHTML='<h1 class=\'text-4xl font-black text-neon tracking-widest uppercase\'>BJJ EXAMS</h1>'">
            <p class="text-slate-400 text-sm font-bold tracking-widest uppercase">Plataforma Oficial de Certificação</p>
        </div>

        <div class="bg-cardbg border border-slate-700/50 p-8 rounded-3xl shadow-2xl relative overflow-hidden fade-in">
            
            <div class="flex gap-4 mb-8 border-b border-slate-700/50 pb-4">
                <button id="tab-login" onclick="mudarAba('login')" class="flex-1 pb-2 text-sm font-black uppercase tracking-widest text-neon border-b-2 border-neon transition-all">Entrar</button>
                <button id="tab-cadastro" onclick="mudarAba('cadastro')" class="flex-1 pb-2 text-sm font-black uppercase tracking-widest text-slate-500 border-b-2 border-transparent hover:text-slate-300 transition-all">Criar Conta</button>
            </div>

            <form id="form-login" onsubmit="fazerLogin(event)" class="space-y-5">
                <div>
                    <label class="text-[10px] text-slate-400 uppercase font-bold ml-2">E-mail</label>
                    <div class="relative mt-1">
                        <i class="ph ph-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i>
                        <input type="email" id="login-email" required class="w-full pl-12 pr-4 py-4 bg-slate-900 border border-slate-700 rounded-2xl text-white outline-none focus:border-neon transition-colors" placeholder="seu@email.com">
                    </div>
                </div>
                <div>
                    <div class="flex justify-between items-center ml-2">
                        <label class="text-[10px] text-slate-400 uppercase font-bold">Senha</label>
                        <button type="button" onclick="recuperarSenha()" class="text-[10px] text-neon hover:text-white font-bold uppercase tracking-wider transition-colors">Esqueceu?</button>
                    </div>
                    <div class="relative mt-1">
                        <i class="ph ph-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i>
                        <input type="password" id="login-senha" required class="w-full pl-12 pr-4 py-4 bg-slate-900 border border-slate-700 rounded-2xl text-white outline-none focus:border-neon transition-colors" placeholder="••••••••">
                    </div>
                </div>
                <button type="submit" id="btn-login" class="bg-neon text-slate-900 font-black w-full py-4 rounded-2xl uppercase tracking-widest text-xs shadow-[0_0_15px_rgba(0,255,209,0.2)] hover:bg-white hover:shadow-none transition-all mt-4">Acessar Painel</button>
            </form>

            <form id="form-cadastro" onsubmit="criarConta(event)" class="space-y-5 hidden">
                <div>
                    <label class="text-[10px] text-slate-400 uppercase font-bold ml-2">Nome Completo</label>
                    <div class="relative mt-1">
                        <i class="ph ph-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i>
                        <input type="text" id="cad-nome" required class="w-full pl-12 pr-4 py-4 bg-slate-900 border border-slate-700 rounded-2xl text-white outline-none focus:border-emerald-500 transition-colors" placeholder="Ex: João Silva">
                    </div>
                </div>
                <div>
                    <label class="text-[10px] text-slate-400 uppercase font-bold ml-2">Sua Graduação (IBJJF)</label>
                    <div class="relative mt-1">
                        <i class="ph ph-shield-star absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i>
                        <select id="cad-faixa" required class="w-full pl-12 pr-4 py-4 bg-slate-900 border border-slate-700 rounded-2xl text-white outline-none focus:border-emerald-500 transition-colors appearance-none">
                            <option value="" disabled selected>Selecione sua faixa atual...</option>
                            <optgroup label="Adulto / Juvenil" class="bg-slate-800 font-bold text-white">
                                <option value="Branca">Faixa Branca</option><option value="Azul">Faixa Azul</option><option value="Roxa">Faixa Roxa</option><option value="Marrom">Faixa Marrom</option><option value="Preta">Faixa Preta</option>
                            </optgroup>
                            <optgroup label="Infantil" class="bg-slate-800 font-bold text-emerald-400">
                                <option value="Cinza e Branca">Cinza e Branca</option><option value="Cinza">Cinza</option><option value="Cinza e Preta">Cinza e Preta</option>
                                <option value="Amarela e Branca">Amarela e Branca</option><option value="Amarela">Amarela</option><option value="Amarela e Preta">Amarela e Preta</option>
                                <option value="Laranja e Branca">Laranja e Branca</option><option value="Laranja">Laranja</option><option value="Laranja e Preta">Laranja e Preta</option>
                                <option value="Verde e Branca">Verde e Branca</option><option value="Verde">Verde</option><option value="Verde e Preta">Verde e Preta</option>
                            </optgroup>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="text-[10px] text-slate-400 uppercase font-bold ml-2">E-mail</label>
                    <div class="relative mt-1">
                        <i class="ph ph-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i>
                        <input type="email" id="cad-email" required class="w-full pl-12 pr-4 py-4 bg-slate-900 border border-slate-700 rounded-2xl text-white outline-none focus:border-emerald-500 transition-colors" placeholder="seu@email.com">
                    </div>
                </div>
                <div>
                    <label class="text-[10px] text-slate-400 uppercase font-bold ml-2">Crie uma Senha</label>
                    <div class="relative mt-1">
                        <i class="ph ph-lock-key absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i>
                        <input type="password" id="cad-senha" required minlength="6" class="w-full pl-12 pr-4 py-4 bg-slate-900 border border-slate-700 rounded-2xl text-white outline-none focus:border-emerald-500 transition-colors" placeholder="Mínimo 6 caracteres">
                    </div>
                </div>
                <button type="submit" id="btn-cad" class="bg-emerald-500 text-slate-900 font-black w-full py-4 rounded-2xl uppercase tracking-widest text-xs shadow-[0_0_15px_rgba(16,185,129,0.2)] hover:bg-white hover:shadow-none transition-all mt-4">Finalizar Matrícula</button>
            </form>
        </div>
        
        <div id="mensagem-erro" class="mt-6 text-center text-rose-400 font-bold text-xs uppercase tracking-widest hidden bg-rose-500/10 py-3 rounded-xl border border-rose-500/30 fade-in">
            </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"; 

        const firebaseConfig = {
            apiKey: "AIzaSyAkIk25LZptKw_N_UJsDO418IwMZNZXBeI",
            authDomain: "bjj-maneger.firebaseapp.com",
            projectId: "bjj-maneger",
            storageBucket: "bjj-maneger.firebasestorage.app",
            messagingSenderId: "415548255893",
            appId: "1:415548255893:web:fdeaed80aeff3bae70759c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Se o usuário já estiver logado, o "Guarda de Trânsito" joga ele direto pro painel dele
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                await rotearUsuario(user.uid);
            }
        });

        // Alternar entre abas Login e Cadastro
        window.mudarAba = (aba) => {
            const formLogin = document.getElementById('form-login');
            const formCad = document.getElementById('form-cadastro');
            const tabLogin = document.getElementById('tab-login');
            const tabCad = document.getElementById('tab-cadastro');
            const msgErro = document.getElementById('mensagem-erro');
            
            msgErro.classList.add('hidden'); // Limpa os erros

            if (aba === 'login') {
                formLogin.classList.remove('hidden');
                formCad.classList.add('hidden');
                tabLogin.className = "flex-1 pb-2 text-sm font-black uppercase tracking-widest text-neon border-b-2 border-neon transition-all";
                tabCad.className = "flex-1 pb-2 text-sm font-black uppercase tracking-widest text-slate-500 border-b-2 border-transparent hover:text-slate-300 transition-all";
            } else {
                formLogin.classList.add('hidden');
                formCad.classList.remove('hidden');
                tabCad.className = "flex-1 pb-2 text-sm font-black uppercase tracking-widest text-emerald-400 border-b-2 border-emerald-400 transition-all";
                tabLogin.className = "flex-1 pb-2 text-sm font-black uppercase tracking-widest text-slate-500 border-b-2 border-transparent hover:text-slate-300 transition-all";
            }
        };

        const mostrarErro = (mensagem) => {
            const divErro = document.getElementById('mensagem-erro');
            divErro.innerText = mensagem;
            divErro.classList.remove('hidden');
        };

        // O Roteador: Descobre de qual coleção o usuário é e manda pra tela certa
        const rotearUsuario = async (uid) => {
            try {
                // Tenta puxar dos Admins e Professores
                const adminDoc = await getDoc(doc(db, "super_admins", uid));
                const colabDoc = await getDoc(doc(db, "colaboradores", uid));
                const usuarioDoc = await getDoc(doc(db, "usuarios", uid));

                if (adminDoc.exists() || colabDoc.exists() || (usuarioDoc.exists() && ['professor', 'admin'].includes(usuarioDoc.data().tipo_usuario))) {
                    window.location.href = "painel_professor.html";
                    return;
                }

                // Tenta puxar da tabela de Alunos
                const alunoDoc = await getDoc(doc(db, "alunos", uid));
                if (alunoDoc.exists()) {
                    window.location.href = "painel_aluno.html";
                    return;
                }

                // Se logou no Firebase, mas não tá em nenhuma tabela (Erro Crítico)
                mostrarErro("Conta não configurada no banco de dados.");
                auth.signOut();

            } catch (error) {
                mostrarErro("Erro de permissão ao acessar o banco.");
                console.error(error);
                auth.signOut();
            }
        };

        // 1. FAZER LOGIN
        window.fazerLogin = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            const email = document.getElementById('login-email').value;
            const senha = document.getElementById('login-senha').value;
            
            btn.innerText = "Autenticando..."; btn.disabled = true;
            document.getElementById('mensagem-erro').classList.add('hidden');

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, senha);
                // Após o signIn, o onAuthStateChanged detecta a mudança e roda o rotearUsuario()
            } catch (error) {
                console.error(error);
                if(error.code === 'auth/invalid-credential') mostrarErro("E-mail ou senha incorretos.");
                else if(error.code === 'auth/too-many-requests') mostrarErro("Muitas tentativas. Tente mais tarde.");
                else mostrarErro("Erro ao fazer login: " + error.code);
                btn.innerText = "Acessar Painel"; btn.disabled = false;
            }
        };

        // 2. CRIAR CONTA DE ALUNO
        window.criarConta = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-cad');
            const nome = document.getElementById('cad-nome').value;
            const faixa = document.getElementById('cad-faixa').value;
            const email = document.getElementById('cad-email').value;
            const senha = document.getElementById('cad-senha').value;

            if(!faixa) { mostrarErro("Por favor, selecione sua graduação."); return; }

            btn.innerText = "Matriculando..."; btn.disabled = true;
            document.getElementById('mensagem-erro').classList.add('hidden');

            try {
                // 1. Cria no Auth do Google
                const userCredential = await createUserWithEmailAndPassword(auth, email, senha);
                const uid = userCredential.user.uid;

                // 2. Grava os dados na tabela 'alunos'
                // Usamos setDoc com o UID do Auth para garantir que o ID do banco seja igual ao ID de login
                await setDoc(doc(db, "alunos", uid), {
                    nome: nome,
                    email: email.toLowerCase(),
                    faixa: faixa,
                    exame_habilitado: false, // Por padrão, entra bloqueado para fazer provas
                    data_cadastro: serverTimestamp(),
                    tipo_usuario: "aluno",
                    origem: "cadastro_site"
                });

                // O roteador automático assumirá daqui e o mandará para o painel_aluno.html

            } catch (error) {
                console.error(error);
                if(error.code === 'auth/email-already-in-use') mostrarErro("Este e-mail já está cadastrado.");
                else if(error.code === 'auth/weak-password') mostrarErro("A senha deve ter pelo menos 6 caracteres.");
                else mostrarErro("Erro ao criar conta: " + error.code);
                btn.innerText = "Finalizar Matrícula"; btn.disabled = false;
            }
        };

        // 3. RECUPERAÇÃO DE SENHA
        window.recuperarSenha = async () => {
            const email = document.getElementById('login-email').value;
            if(!email) {
                mostrarErro("Digite seu e-mail no campo acima primeiro.");
                return;
            }
            try {
                await sendPasswordResetEmail(auth, email);
                alert("E-mail de redefinição de senha enviado para " + email);
            } catch (error) {
                console.error(error);
                if(error.code === 'auth/invalid-email') mostrarErro("E-mail inválido.");
                else mostrarErro("Erro ao enviar e-mail: " + error.code);
            }
        };
    </script>
</body>
</html>
