<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | BJJ Exams</title>
    <link rel="icon" type="image/png" href="logo_bjjexems.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { neon: '#00FFD1', darkbg: '#0B1120', cardbg: '#1E293B' }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: var(--darkbg); color: #E2E8F0; }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-darkbg h-screen flex items-center justify-center relative overflow-hidden selection:bg-neon selection:text-slate-900 p-4">

    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-neon/10 rounded-full blur-[100px] pointer-events-none"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-emerald-500/10 rounded-full blur-[100px] pointer-events-none"></div>

    <div class="w-full max-w-2xl z-10 flex flex-col max-h-full">
        
        <div class="text-center mb-6 shrink-0 fade-in mt-4">
            <img src="logo_bjjexems.png" alt="BJJ Exams" class="h-16 mx-auto filter drop-shadow-[0_0_15px_rgba(0,255,209,0.4)] mb-4" onerror="this.outerHTML='<h1 class=\'text-4xl font-black text-neon tracking-widest uppercase\'>BJJ EXAMS</h1>'">
            <p class="text-slate-400 text-sm font-bold tracking-widest uppercase">Plataforma Oficial de Certificação EAD</p>
        </div>

        <div class="bg-cardbg border border-slate-700/50 p-6 sm:p-8 rounded-3xl shadow-2xl relative overflow-hidden fade-in flex flex-col min-h-0">
            
            <div class="flex gap-4 mb-6 border-b border-slate-700/50 pb-4 shrink-0">
                <button id="tab-login" onclick="mudarAba('login')" class="flex-1 pb-2 text-sm font-black uppercase tracking-widest text-neon border-b-2 border-neon transition-all">Entrar</button>
                <button id="tab-cadastro" onclick="mudarAba('cadastro')" class="flex-1 pb-2 text-sm font-black uppercase tracking-widest text-slate-500 border-b-2 border-transparent hover:text-slate-300 transition-all">Criar Conta</button>
            </div>

            <div class="overflow-y-auto custom-scroll pr-2 flex-1">
                
                <form id="form-login" onsubmit="fazerLogin(event)" class="space-y-5 max-w-md mx-auto mt-4">
                    <div>
                        <label class="text-[10px] text-slate-400 uppercase font-bold ml-2">E-mail</label>
                        <div class="relative mt-1">
                            <i class="ph ph-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i>
                            <input type="email" id="login-email" required class="w-full pl-12 pr-4 py-4 bg-slate-900 border border-slate-700 rounded-2xl text-white outline-none focus:border-neon transition-colors" placeholder="seu@email.com">
                        </div>
                    </div>
                    <div>
                        <div class="flex justify-between items-center ml-2">
                            <label class="text-[10px] text-slate-400 uppercase font-bold">Senha</label>
                            <button type="button" onclick="recuperarSenha()" class="text-[10px] text-neon hover:text-white font-bold uppercase tracking-wider transition-colors">Esqueceu?</button>
                        </div>
                        <div class="relative mt-1">
                            <i class="ph ph-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i>
                            <input type="password" id="login-senha" required class="w-full pl-12 pr-4 py-4 bg-slate-900 border border-slate-700 rounded-2xl text-white outline-none focus:border-neon transition-colors" placeholder="••••••••">
                        </div>
                    </div>
                    <button type="submit" id="btn-login" class="bg-neon text-slate-900 font-black w-full py-4 rounded-2xl uppercase tracking-widest text-xs shadow-[0_0_15px_rgba(0,255,209,0.2)] hover:bg-white hover:shadow-none transition-all mt-4">Acessar Painel</button>
                </form>

                <form id="form-cadastro" onsubmit="criarConta(event)" class="space-y-6 hidden pb-4">
                    
                    <div class="bg-slate-800/30 p-4 rounded-2xl border border-slate-700/50 mb-4">
                        <label class="text-[10px] text-neon uppercase font-bold ml-2 block mb-2">Qual o seu perfil?</label>
                        <select id="cad-tipo" onchange="toggleCamposPerfil()" required class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-white outline-none focus:border-neon appearance-none text-sm font-bold">
                            <option value="aluno">Sou Aluno(a)</option>
                            <option value="professor">Sou Professor(a)</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="text-[10px] text-slate-400 uppercase font-bold ml-2">Nome Completo</label>
                            <input type="text" id="cad-nome" required class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-white outline-none focus:border-emerald-500 mt-1 text-sm">
                        </div>
                        <div>
                            <label class="text-[10px] text-slate-400 uppercase font-bold ml-2">CPF</label>
                            <input type="text" id="cad-cpf" required class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-white outline-none focus:border-emerald-500 mt-1 text-sm" placeholder="000.000.000-00">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                            <label class="text-[10px] text-slate-400 uppercase font-bold ml-2">Sexo</label>
                            <select id="cad-sexo" required class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-white outline-none focus:border-emerald-500 mt-1 text-sm appearance-none">
                                <option value="Masculino">Masculino</option><option value="Feminino">Feminino</option><option value="Outro">Outro</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-[10px] text-slate-400 uppercase font-bold ml-2">Nascimento</label>
                            <input type="date" id="cad-nasc" required class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-white outline-none focus:border-emerald-500 mt-1 text-sm">
                        </div>
                        <div>
                            <label class="text-[10px] text-slate-400 uppercase font-bold ml-2">Graduação Atual</label>
                            <select id="cad-faixa" required class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-white outline-none focus:border-emerald-500 mt-1 text-sm appearance-none">
                                </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="text-[10px] text-slate-400 uppercase font-bold ml-2">E-mail de Acesso</label>
                            <input type="email" id="cad-email" required class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-white outline-none focus:border-emerald-500 mt-1 text-sm">
                        </div>
                        <div>
                            <label class="text-[10px] text-slate-400 uppercase font-bold ml-2">Equipe / Escola</label>
                            <input type="text" id="cad-equipe" required class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-white outline-none focus:border-emerald-500 mt-1 text-sm" placeholder="Sua academia">
                        </div>
                    </div>

                    <div class="border-t border-slate-800 pt-4 mt-2">
                        <label class="text-[10px] text-slate-400 uppercase font-bold ml-2">Endereço</label>
                        <div class="flex gap-2 mt-1 mb-3">
                            <input type="text" id="cad-cep" class="w-1/3 px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-white outline-none focus:border-emerald-500 text-sm" placeholder="CEP">
                            <button type="button" onclick="buscarCep()" class="bg-slate-800 text-emerald-400 border border-slate-700 font-bold px-4 rounded-xl text-xs uppercase hover:bg-slate-700 transition-colors shrink-0">Buscar CEP</button>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3">
                            <input type="text" id="cad-logradouro" class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-white text-sm" placeholder="Rua / Logradouro">
                            <input type="text" id="cad-bairro" class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-white text-sm" placeholder="Bairro">
                        </div>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                            <input type="text" id="cad-numero" class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-white text-sm" placeholder="Nº">
                            <input type="text" id="cad-comp" class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-white text-sm" placeholder="Complemento">
                            <input type="text" id="cad-cidade" class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-white text-sm" placeholder="Cidade">
                            <input type="text" id="cad-uf" class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-white text-sm" placeholder="UF">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 border-t border-slate-800 pt-4">
                        <div>
                            <label class="text-[10px] text-slate-400 uppercase font-bold ml-2">Crie uma Senha</label>
                            <input type="password" id="cad-senha" required minlength="6" class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-white outline-none focus:border-emerald-500 mt-1 text-sm">
                        </div>
                        <div>
                            <label class="text-[10px] text-slate-400 uppercase font-bold ml-2">Confirme a Senha</label>
                            <input type="password" id="cad-senha-conf" required minlength="6" class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-white outline-none focus:border-emerald-500 mt-1 text-sm">
                        </div>
                    </div>

                    <button type="submit" id="btn-cad" class="bg-emerald-500 text-slate-900 font-black w-full py-4 rounded-xl uppercase tracking-widest text-xs shadow-[0_0_15px_rgba(16,185,129,0.2)] hover:bg-white hover:shadow-none transition-all mt-6">Criar Conta na Plataforma</button>
                </form>
            </div>
        </div>
        
        <div id="mensagem-erro" class="mt-4 shrink-0 text-center text-rose-400 font-bold text-xs uppercase tracking-widest hidden bg-rose-500/10 py-3 rounded-xl border border-rose-500/30 fade-in"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection, getDocs, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"; 

        const firebaseConfig = {
            apiKey: "AIzaSyAkIk25LZptKw_N_UJsDO418IwMZNZXBeI",
            authDomain: "bjj-maneger.firebaseapp.com",
            projectId: "bjj-maneger",
            storageBucket: "bjj-maneger.firebasestorage.app",
            messagingSenderId: "415548255893",
            appId: "1:415548255893:web:fdeaed80aeff3bae70759c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // LISTA ESTrita DE FAIXAS (Branca a Preta em ordem)
        const faixasCompletas = [
            "Branca", "Cinza e Branca", "Cinza", "Cinza e Preta", 
            "Amarela e Branca", "Amarela", "Amarela e Preta", 
            "Laranja e Branca", "Laranja", "Laranja e Preta", 
            "Verde e Branca", "Verde", "Verde e Preta", 
            "Azul", "Roxa", "Marrom", "Preta"
        ];
        const faixasProfessor = ["Marrom", "Preta"];

        // PREENCHER DROPDOWN DE FAIXA DINAMICAMENTE
        window.toggleCamposPerfil = () => {
            const tipo = document.getElementById('cad-tipo').value;
            const selectFaixa = document.getElementById('cad-faixa');
            selectFaixa.innerHTML = '<option value="" disabled selected>Selecione sua graduação...</option>';
            
            const lista = tipo === 'professor' ? faixasProfessor : faixasCompletas;
            lista.forEach(f => { selectFaixa.innerHTML += `<option value="${f}">${f}</option>`; });
        };
        // Inicializa o dropdown
        setTimeout(window.toggleCamposPerfil, 100);

        // ROTEADOR INTELIGENTE (Mesma Lógica Python)
        const rotearUsuario = async (uid) => {
            try {
                const superAdminDoc = await getDoc(doc(db, "super_admins", uid));
                if (superAdminDoc.exists()) { window.location.href = "painel_admin.html"; return; }

                const colabDoc = await getDoc(doc(db, "colaboradores", uid));
                const usuarioDoc = await getDoc(doc(db, "usuarios", uid)); // Nova tabela se professor se cadastrar via site
                if (colabDoc.exists() || (usuarioDoc.exists() && ['professor', 'admin'].includes(usuarioDoc.data().tipo_usuario))) {
                    window.location.href = "painel_professor.html"; return;
                }

                const alunoDoc = await getDoc(doc(db, "alunos", uid));
                if (alunoDoc.exists()) { window.location.href = "painel_aluno.html"; return; }

                mostrarErro("Conta sem perfil de acesso. Fale com o suporte.");
                auth.signOut();
            } catch (error) { mostrarErro("Erro de permissão ao acessar o banco."); auth.signOut(); }
        };

        onAuthStateChanged(auth, async (user) => { if (user) await rotearUsuario(user.uid); });

        // CONTROLES DE UI
        window.mudarAba = (aba) => {
            const formLogin = document.getElementById('form-login'); const formCad = document.getElementById('form-cadastro');
            const tabLogin = document.getElementById('tab-login'); const tabCad = document.getElementById('tab-cadastro');
            document.getElementById('mensagem-erro').classList.add('hidden');

            if (aba === 'login') {
                formLogin.classList.remove('hidden'); formCad.classList.add('hidden');
                tabLogin.className = "flex-1 pb-2 text-sm font-black uppercase tracking-widest text-neon border-b-2 border-neon transition-all";
                tabCad.className = "flex-1 pb-2 text-sm font-black uppercase tracking-widest text-slate-500 border-b-2 border-transparent hover:text-slate-300 transition-all";
            } else {
                formLogin.classList.add('hidden'); formCad.classList.remove('hidden');
                tabCad.className = "flex-1 pb-2 text-sm font-black uppercase tracking-widest text-emerald-400 border-b-2 border-emerald-400 transition-all";
                tabLogin.className = "flex-1 pb-2 text-sm font-black uppercase tracking-widest text-slate-500 border-b-2 border-transparent hover:text-slate-300 transition-all";
            }
        };

        const mostrarErro = (msg) => { const div = document.getElementById('mensagem-erro'); div.innerText = msg; div.classList.remove('hidden'); };

        // BUSCA CEP VIA API
        window.buscarCep = async () => {
            const cep = document.getElementById('cad-cep').value.replace(/\D/g, '');
            if (cep.length !== 8) { mostrarErro("CEP inválido."); return; }
            document.getElementById('mensagem-erro').classList.add('hidden');
            try {
                const res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
                const dados = await res.json();
                if (dados.erro) { mostrarErro("CEP não encontrado."); return; }
                document.getElementById('cad-logradouro').value = dados.logradouro;
                document.getElementById('cad-bairro').value = dados.bairro;
                document.getElementById('cad-cidade').value = dados.localidade;
                document.getElementById('cad-uf').value = dados.uf;
                document.getElementById('cad-numero').focus();
            } catch (e) { mostrarErro("Erro na busca de CEP."); }
        };

        // LOGIN
        window.fazerLogin = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-login'); btn.innerText = "Autenticando..."; btn.disabled = true;
            document.getElementById('mensagem-erro').classList.add('hidden');
            try { await signInWithEmailAndPassword(auth, document.getElementById('login-email').value, document.getElementById('login-senha').value); } 
            catch (error) { 
                if(error.code === 'auth/invalid-credential') mostrarErro("E-mail ou senha incorretos.");
                else mostrarErro("Erro ao fazer login: " + error.code);
                btn.innerText = "Acessar Painel"; btn.disabled = false; 
            }
        };

        // CADASTRO DE ALUNO / PROFESSOR
        window.criarConta = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-cad');
            const senha = document.getElementById('cad-senha').value;
            const conf = document.getElementById('cad-senha-conf').value;
            
            if (senha !== conf) { mostrarErro("As senhas não coincidem."); return; }
            if (!document.getElementById('cad-faixa').value) { mostrarErro("Selecione sua faixa."); return; }

            btn.innerText = "Processando Cadastro..."; btn.disabled = true;
            document.getElementById('mensagem-erro').classList.add('hidden');

            const tipoUser = document.getElementById('cad-tipo').value;
            const email = document.getElementById('cad-email').value.toLowerCase();
            
            try {
                // 1. Cria a conta no Firebase Auth
                const userCredential = await createUserWithEmailAndPassword(auth, email, senha);
                const uid = userCredential.user.uid;

                // 2. Monta o Dicionário de Dados
                const perfilData = {
                    nome: document.getElementById('cad-nome').value.toUpperCase(),
                    email: email,
                    cpf: document.getElementById('cad-cpf').value,
                    sexo: document.getElementById('cad-sexo').value,
                    data_nascimento: document.getElementById('cad-nasc').value,
                    faixa: document.getElementById('cad-faixa').value,
                    equipe_origem: document.getElementById('cad-equipe').value.toUpperCase(),
                    cep: document.getElementById('cad-cep').value,
                    logradouro: document.getElementById('cad-logradouro').value.toUpperCase(),
                    numero: document.getElementById('cad-numero').value,
                    complemento: document.getElementById('cad-comp').value.toUpperCase(),
                    bairro: document.getElementById('cad-bairro').value.toUpperCase(),
                    cidade: document.getElementById('cad-cidade').value.toUpperCase(),
                    uf: document.getElementById('cad-uf').value.toUpperCase(),
                    data_cadastro: serverTimestamp(),
                    tipo_usuario: tipoUser
                };

                // 3. Direciona para a Coleção Correta Baseado no Tipo
                if (tipoUser === 'aluno') {
                    perfilData.exame_habilitado = false;
                    await setDoc(doc(db, "alunos", uid), perfilData);
                } else if (tipoUser === 'professor') {
                    await setDoc(doc(db, "usuarios", uid), perfilData);
                    // Para fins de compatibilidade com regras de leitura, salvar também em colaboradores
                    await setDoc(doc(db, "colaboradores", uid), { nome: perfilData.nome, email: email, tipo: "professor", equipe_id: "pendente" });
                }

            } catch (error) {
                console.error(error);
                if(error.code === 'auth/email-already-in-use') mostrarErro("Este e-mail já está cadastrado.");
                else mostrarErro("Erro: " + error.code);
                btn.innerText = "Criar Conta na Plataforma"; btn.disabled = false;
            }
        };

        // RECUPERAR SENHA
        window.recuperarSenha = async () => {
            const email = document.getElementById('login-email').value;
            if(!email) { mostrarErro("Para recuperar, digite seu e-mail no campo acima."); return; }
            try { await sendPasswordResetEmail(auth, email); alert("E-mail enviado para: " + email); } 
            catch (error) { mostrarErro("Erro: " + error.code); }
        };
    </script>
</body>
</html>
