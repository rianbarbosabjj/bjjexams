<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BJJ Exams - Login</title>
    <link rel="icon" type="image/png" href="logo_bjjexems.png">
    <style>
        :root {
            --neon-turquesa: #00FFD1;
            --bg-dark: #0B1120;
            --card-dark: #1E293B;
            --text-silver: #E2E8F0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-silver);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }

        .login-card {
            background: var(--card-dark);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(0, 255, 209, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .logo-login { max-width: 160px; margin-bottom: 30px; filter: drop-shadow(0 0 10px rgba(0, 255, 209, 0.3)); }

        .input-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 0.85rem; color: #94A3B8; margin-bottom: 8px; }
        
        input {
            width: 100%;
            padding: 12px 16px;
            background: #0F172A;
            border: 1px solid rgba(226, 232, 240, 0.1);
            border-radius: 8px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--neon-turquesa); box-shadow: 0 0 8px rgba(0, 255, 209, 0.2); }

        .btn-entrar {
            width: 100%;
            background: var(--neon-turquesa);
            color: var(--bg-dark);
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-entrar:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(0, 255, 209, 0.4); }
        
        #error-msg { color: #ff4b4b; font-size: 0.85rem; margin-top: 15px; display: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="logo_bjjexems.png" alt="BJJ Exams" class="logo-login">
        
        <div class="input-group">
            <label>E-mail</label>
            <input type="email" id="email" placeholder="seu@email.com">
        </div>

        <div class="input-group">
            <label>Senha</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button class="btn-entrar" id="loginBtn">Entrar na Plataforma</button>
        <p id="error-msg">Credenciais inválidas. Tente novamente.</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // CONFIGURAÇÃO DO SEU PROJETO (Copie do Console do Firebase)
        const firebaseConfig = {
            apiKey: "SUA_API_KEY",
            authDomain: "seu-projeto.firebaseapp.com",
            projectId: "seu-projeto",
            storageBucket: "seu-projeto.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:12345:web:abcde"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                // Sucesso: Redireciona para o painel
                console.log("Logado com sucesso:", user.email);
                window.location.href = "painel_aluno.html";
                
            } catch (error) {
                errorMsg.style.display = 'block';
                console.error("Erro ao logar:", error.message);
            }
        });
    </script>
</body>
</html>
