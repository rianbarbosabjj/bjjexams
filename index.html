<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BJJ Exams - Em Breve</title>
    
    <link rel="icon" type="image/png" href="logo_bjjexems.png">
    <link rel="apple-touch-icon" href="logo_bjjexems.png">

    <style>
        :root {
            --neon-turquesa: #00FFD1;
            --bg-dark: #0B1120;
            --card-dark: #1E293B;
            --text-silver: #E2E8F0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-silver);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            overflow-x: hidden;
        }

        .container {
            padding: 20px;
            max-width: 800px;
            z-index: 2;
        }

        /* Logo principal BJJ Exams */
        .logo-exams {
            max-width: 220px;
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 15px rgba(0, 255, 209, 0.4));
        }

        .status-badge {
            background: rgba(0, 255, 209, 0.1);
            color: var(--neon-turquesa);
            border: 1px solid var(--neon-turquesa);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: bold;
            letter-spacing: 2px;
            display: inline-block;
            margin-bottom: 25px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 209, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(0, 255, 209, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 209, 0); }
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 15px;
            background: linear-gradient(to right, #fff, var(--neon-turquesa));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Promoção BJJ Manager */
        .manager-promo {
            background: var(--card-dark);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 35px;
            border-radius: 24px;
            margin-top: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .logo-manager {
            width: 100%;
            max-width: 240px;
            margin-bottom: 20px;
            opacity: 0.9;
        }

        .cta-button {
            display: inline-block;
            background: var(--neon-turquesa);
            color: var(--bg-dark);
            text-decoration: none;
            padding: 16px 35px;
            border-radius: 10px;
            font-weight: 800;
            font-size: 1rem;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        .cta-button:hover {
            background: #fff;
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--neon-turquesa);
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .logo-exams { max-width: 180px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo_bjjexems.png" alt="BJJ Exams Logo" class="logo-exams">
        
        <br>
        <div class="status-badge">SISTEMA EM CONSTRUÇÃO</div>
        
        <h1>O futuro educacional do jiu-jitsu está chegando.</h1>
        <p style="color: #94A3B8; max-width: 600px; margin: 0 auto 40px;">
            Aguarde! Em breve você terá acesso à plataforma mais completa para exames de faixa e cursos especializados.
        </p>

        <div class="manager-promo">
            <img src="https://maneger.bjjdigital.com.br/logo_bjj_maneger.png" alt="BJJ Manager" class="logo-manager">
            <p style="font-size: 1.1rem; margin-bottom: 25px; color: #cbd5e1;">
                Enquanto isso, que tal ter a <strong>gestão completa</strong> de sua equipe na palma da mão?
            </p>
            <a href="https://maneger.bjjdigital.com.br/" class="cta-button">
                Conheça agora o BJJ Manager 🚀
            </a>
        </div>
    </div>

</body>
</html>
