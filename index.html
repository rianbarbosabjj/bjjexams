<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BJJ Exams - Em Breve</title>
    
    <link rel="icon" type="image/png" href="logo_bjjexems.png">
    <link rel="apple-touch-icon" href="logo_bjjexems.png">

    <style>
        :root {
            --neon-turquesa: #00FFD1;
            --bg-dark: #0B1120;
            --card-dark: #1E293B;
            --text-silver: #E2E8F0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-silver);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            overflow-x: hidden;
        }

        .container {
            padding: 20px;
            max-width: 800px;
            z-index: 2;
        }

        .status-badge {
            background: rgba(0, 255, 209, 0.1);
            color: var(--neon-turquesa);
            border: 1px solid var(--neon-turquesa);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: bold;
            letter-spacing: 2px;
            display: inline-block;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 209, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(0, 255, 209, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 209, 0); }
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, var(--neon-turquesa));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .manager-promo {
            background: var(--card-dark);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            margin-top: 30px;
        }

        .logo-manager {
            width: 100%;
            max-width: 280px;
            margin-bottom: 25px;
            filter: drop-shadow(0 0 15px rgba(0, 255, 209, 0.2));
        }

        .cta-button {
            display: inline-block;
            background: var(--neon-turquesa);
            color: var(--bg-dark);
            text-decoration: none;
            padding: 18px 40px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1.1rem;
            text-transform: uppercase;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(0, 255, 209, 0.2);
        }

        .cta-button:hover {
            background: #fff;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-badge">SISTEMA EM CONSTRUÇÃO</div>
        <h1>BJJ Exams está chegando.</h1>
        <p style="color: #94A3B8; margin-bottom: 40px;">A maior plataforma de certificação técnica do Jiu-Jitsu brasileiro.</p>

        <div class="manager-promo">
            <img src="https://firebasestorage.googleapis.com/v0/b/bjj-maneger.firebasestorage.app/o/equipes_logos%2F9laeN9et3QUleUhnLE84Xne5QT12_1776909190526_logo_bjj_maneger.png?alt=media&token=c31c49b1-7ec3-473e-b71b-404f327a4aa6" class="logo-manager">
            <p style="font-size: 1.2rem; margin-bottom: 30px;">
                Domine sua academia hoje mesmo! Conheça a ferramenta definitiva de gestão.
            </p>
            <a href="https://maneger.bjjdigital.com.br/" class="cta-button">
                Acesse o BJJ Manager 🚀
            </a>
        </div>
    </div>
</body>
</html>
