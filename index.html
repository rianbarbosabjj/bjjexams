<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BJJ Exams - Área do Aluno</title>
    <style>
        :root {
            /* Paleta extraída da logo oficial */
            --primary-neon: #00FFD1; /* Turquesa vibrante */
            --primary-dark: #08b394; /* Tom mais fechado para hover */
            --bg-dark: #0B1120;      /* Fundo Deep Dark */
            --bg-card: #1E293B;      /* Cor dos cards */
            --text-metallic: #E2E8F0; /* Cinza metálico da logo */
            --text-dim: #94A3B8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-metallic);
            line-height: 1.6;
        }

        /* Container Principal */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header e Logo */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px 0;
            border-bottom: 1px solid rgba(0, 255, 209, 0.1);
        }

        .logo-container img {
            max-width: 180px;
            height: auto;
            filter: drop-shadow(0 0 8px rgba(0, 255, 209, 0.3));
        }

        /* Status de Graduação */
        .status-bar {
            background: var(--bg-card);
            border-left: 4px solid var(--primary-neon);
            padding: 20px;
            border-radius: 8px;
            margin: 30px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .belt-info h2 {
            font-size: 0.9rem;
            text-transform: uppercase;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        .belt-name {
            font-size: 1.5rem;
            color: var(--primary-neon);
            font-weight: bold;
        }

        /* Grid de Cursos */
        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 40px;
        }

        .card {
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 255, 209, 0.1);
            border-color: var(--primary-neon);
        }

        .card-content {
            padding: 20px;
        }

        .card-tag {
            background: rgba(0, 255, 209, 0.1);
            color: var(--primary-neon);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 10px;
        }

        /* Botões Estilizados */
        .btn {
            display: inline-block;
            background: var(--primary-neon);
            color: var(--bg-dark);
            padding: 12px 24px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            width: 100%;
            text-align: center;
        }

        .btn:hover {
            background: var(--primary-dark);
            box-shadow: 0 0 15px var(--primary-neon);
        }

        .btn-outline {
            background: transparent;
            color: var(--primary-neon);
            border: 1px solid var(--primary-neon);
        }

        .btn-outline:hover {
            background: rgba(0, 255, 209, 0.05);
        }

        /* Estilo do Cronômetro (Placeholder) */
        .timer-display {
            font-family: 'Courier New', monospace;
            font-size: 2.5rem;
            color: var(--primary-neon);
            text-align: center;
            margin: 20px 0;
            text-shadow: 0 0 10px rgba(0, 255, 209, 0.5);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="logo-container">
                <img src="logo_bjjexems.png" alt="BJJ Exams Logo">
            </div>
            <div class="user-profile">
                <span>Olá, <strong>Professor Barbosa</strong></span>
            </div>
        </header>

        <section class="status-bar">
            <div class="belt-info">
                <h2>Próximo Exame</h2>
                <p class="belt-name">Faixa Preta - 1º Grau</p>
            </div>
            <div class="action">
                <button class="btn btn-outline">Ver Requisitos</button>
            </div>
        </section>

        <main>
            <h1 style="margin-bottom: 20px;">Seus Cursos e Certificações</h1>
            
            <div class="course-grid">
                <div class="card">
                    <div class="card-content">
                        <span class="card-tag">EXAME DISPONÍVEL</span>
                        <h3>Avaliação Teórica de Arbitragem</h3>
                        <p style="color: var(--text-dim); margin: 10px 0;">Teste seus conhecimentos técnicos antes da graduação prática.</p>
                        <div class="timer-display">00:59:59</div>
                        <button class="btn">Iniciar Prova</button>
                    </div>
                </div>

                <div class="card">
                    <div class="card-content">
                        <span class="card-tag">CURSO EAD</span>
                        <h3>Metodologia Kids BJJ</h3>
                        <p style="color: var(--text-dim); margin: 10px 0;">Aprenda as melhores didáticas para turmas infantis.</p>
                        <div style="margin: 20px 0; background: #334155; height: 8px; border-radius: 4px;">
                            <div style="background: var(--primary-neon); width: 65%; height: 100%; border-radius: 4px;"></div>
                        </div>
                        <button class="btn btn-outline">Continuar Aula</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
