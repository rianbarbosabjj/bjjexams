<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BJJ Exams - Portal de Ensino e Avaliação</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- PALETA DE CORES BJJ EXAMS --- */
        :root {
            --bg-color: #0B1120; /* Azul Marinho muito escuro, quase preto */
            --card-bg: #1E293B; /* Azul Slate Escuro para os cartões */
            --primary: #F59E0B; /* Âmbar / Dourado para botões e destaques */
            --primary-hover: #D97706;
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
            --border-color: rgba(245, 158, 11, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, #1e293b 0%, transparent 40%),
                              radial-gradient(circle at bottom left, #0f172a 0%, transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 420px;
            padding: 40px;
            position: relative;
            overflow: hidden;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-area h1 {
            color: var(--primary);
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .logo-area p {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 5px;
        }

        /* --- FORMULÁRIOS --- */
        .form-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
            transition: all 0.4s ease;
        }

        /* Esconde o formulário de registro inicialmente */
        #register-form {
            display: none;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .input-group input, .input-group select {
            background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 14px;
            color: var(--text-main);
            font-size: 14px;
            transition: border-color 0.3s;
            outline: none;
        }

        .input-group input:focus, .input-group select:focus {
            border-color: var(--primary);
        }

        button.btn-submit {
            background: linear-gradient(135deg, var(--primary) 0%, #d97706 100%);
            color: #000;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        button.btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4);
        }

        .toggle-text {
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 20px;
        }

        .toggle-text a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.3s;
        }

        .toggle-text a:hover {
            color: var(--text-main);
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="logo-area">
            <h1>BJJ Exams</h1>
            <p>Plataforma de Cursos e Certificação</p>
        </div>

        <div id="login-form" class="form-section">
            <div class="input-group">
                <label for="login-email">Email ou CPF</label>
                <input type="text" id="login-email" placeholder="Digite seu acesso">
            </div>
            
            <div class="input-group">
                <label for="login-password">Senha</label>
                <input type="password" id="login-password" placeholder="Digite sua senha">
            </div>

            <button class="btn-submit" onclick="realizarLogin()">Entrar na Plataforma</button>

            <div class="toggle-text">
                Novo por aqui? <a onclick="toggleForms()">Crie sua conta</a>
            </div>
        </div>

        <div id="register-form" class="form-section">
            <div class="input-group">
                <label for="reg-nome">Nome Completo</label>
                <input type="text" id="reg-nome" placeholder="Seu nome">
            </div>

            <div class="input-group">
                <label for="reg-email">Email</label>
                <input type="email" id="reg-email" placeholder="Seu email">
            </div>

            <div class="input-group">
                <label for="reg-tipo">Você é:</label>
                <select id="reg-tipo">
                    <option value="aluno">Aluno(a)</option>
                    <option value="professor">Professor(a)</option>
                </select>
            </div>

            <div class="input-group">
                <label for="reg-password">Senha</label>
                <input type="password" id="reg-password" placeholder="Crie uma senha">
            </div>

            <button class="btn-submit" onclick="realizarCadastro()">Finalizar Cadastro</button>

            <div class="toggle-text">
                Já tem uma conta? <a onclick="toggleForms()">Fazer Login</a>
            </div>
        </div>
    </div>

    <script>
        function toggleForms() {
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            
            if (loginForm.style.display === 'none') {
                loginForm.style.display = 'flex';
                registerForm.style.display = 'none';
            } else {
                loginForm.style.display = 'none';
                registerForm.style.display = 'flex';
            }
        }

        function realizarLogin() {
            // Aqui futuramente faremos a requisição para a sua API Python
            alert("Redirecionando para o painel de estudos...");
        }

        function realizarCadastro() {
            // Aqui futuramente faremos o envio dos dados do novo aluno
            alert("Cadastro realizado! Bem-vindo ao BJJ Exams.");
            toggleForms();
        }
    </script>
</body>
</html>
